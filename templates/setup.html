<!DOCTYPE html>
<html>
<head>
    <title>FamPay Setup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🔐</div>
            <h2 class="text-2xl font-bold text-gray-800">FamPay Setup</h2>
            <p class="text-gray-500 text-sm mt-1">Enter your credentials to start monitoring</p>
        </div>
        
        <div id="error" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded mb-4 text-sm"></div>
        <div id="success" class="hidden bg-green-50 border-l-4 border-green-500 text-green-700 px-4 py-3 rounded mb-4 text-sm"></div>
        
        <form id="setupForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">📧 Gmail Email</label>
                <input type="email" id="email" required
                       placeholder="your.email@gmail.com"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">🔑 Gmail App Password</label>
                <input type="password" id="password" required
                       placeholder="abcd efgh ijkl mnop"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-400 mt-1">16-digit app password from Google</p>
            </div>
            
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">💳 FamPay UPI ID</label>
                <input type="text" id="upi" required
                       placeholder="yourname@fam"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <button type="submit" id="submitBtn"
                    class="w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:from-blue-600 hover:to-blue-700 transition-all shadow-lg">
                🚀 Start Monitoring
            </button>
        </form>
        
        <div id="loading" class="hidden text-center mt-6">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent"></div>
            <p class="text-sm text-gray-600 mt-2">Setting up...</p>
        </div>
    </div>
    
    <script>
        document.getElementById('setupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const upi = document.getElementById('upi').value.trim();
            
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('error').classList.add('hidden');
            document.getElementById('success').classList.add('hidden');
            
            try {
                const response = await fetch('/setup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams({
                        gmail_email: email,
                        gmail_password: password,
                        fampay_upi: upi
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('success').textContent = 
                        `✅ ${data.message} Found ${data.payments_found} payments!`;
                    document.getElementById('success').classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    document.getElementById('error').textContent = '❌ ' + data.error;
                    document.getElementById('error').classList.remove('hidden');
                }
            } catch(err) {
                document.getElementById('error').textContent = '❌ Connection error: ' + err.message;
                document.getElementById('error').classList.remove('hidden');
            }
            
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('submitBtn').disabled = false;
        });
    </script>
</body>
</html>
